services:
  # Base service for import - to be extended with specific database type
  import:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: data-import
    environment:
      - NODE_ENV=development
      - PORT=8080
      - API_KEY=test-api-key
    volumes:
      - ./tools:/app/tools
      - ./tests:/app/tests
    command: ["node", "tools/import-data.js"]
    networks:
      - default
    depends_on:
      - api
    
  # API server using memory database for import
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pages-items-api-import
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - API_KEY=test-api-key
      - DB_TYPE=memory
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - default