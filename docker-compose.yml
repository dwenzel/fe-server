services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pages-items-api
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - API_KEY=test-api-key
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: pages-items-api-test
    environment:
      - NODE_ENV=test
      - API_URL=http://api:8080
      - API_KEY=test-api-key
      - TEST_TYPE=${TEST_TYPE:-all}
    volumes:
      - ./.build/reports:/app/.build/reports
      - ./tests:/app/tests:ro
      - ./src:/app/src:ro
    depends_on:
      - api
    networks:
      - api-test-network

networks:
  api-test-network:
    driver: bridge
