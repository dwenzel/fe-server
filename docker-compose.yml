version: '3'

services:
  fe-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fe-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - API_URL=http://localhost:3000
      - API_KEY=test-api-key
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run preview

  # Test container
  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fe-server-test
    environment:
      - NODE_ENV=test
      - API_URL=http://fe-server:3000
      - API_KEY=test-api-key
    volumes:
      - .:/app
      - /app/node_modules
    command: npm test
    depends_on:
      - fe-server