name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Create report directories
        run: mkdir -p .build/reports/junit .build/reports/html .build/reports/coverage
        
      - name: Run unit tests
        run: npm run test:unit
      
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-reports
          path: |
            .build/reports/junit/unit.xml
            .build/reports/html/unit-test-report.html
            .build/reports/coverage/unit
          retention-days: 7
      
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always() # always run even if the previous step fails
        with:
          report_paths: '.build/reports/junit/unit.xml'
          check_name: 'Unit Test Results'
          fail_on_failure: true
          require_tests: true
          include_passed: true

  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Create report directories
        run: mkdir -p .build/reports/junit .build/reports/html .build/reports/coverage
        
      - name: Start API server
        run: |
          npm start &
          # Wait for server to start
          sleep 5
        env:
          NODE_ENV: test
          PORT: 8080
          API_KEY: test-api-key
        
      - name: Run functional tests
        run: npm run test:functional
        env:
          API_URL: http://localhost:8080
          API_KEY: test-api-key
      
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: functional-test-reports
          path: |
            .build/reports/junit/functional.xml
            .build/reports/html/functional-test-report.html
            .build/reports/coverage/functional
          retention-days: 7
      
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always() # always run even if the previous step fails
        with:
          report_paths: '.build/reports/junit/functional.xml'
          check_name: 'Functional Test Results'
          fail_on_failure: true
          require_tests: true
          include_passed: true
  
  combined-coverage:
    name: Combined Coverage Report
    needs: [unit-tests, functional-tests]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Download unit test artifacts
        uses: actions/download-artifact@v4
        with:
          name: unit-test-reports
          path: .build/reports
      
      - name: Download functional test artifacts
        uses: actions/download-artifact@v4
        with:
          name: functional-test-reports
          path: .build/reports
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate combined coverage report
        run: npm run test:coverage
      
      - name: Upload combined coverage report
        uses: actions/upload-artifact@v4
        with:
          name: combined-coverage-report
          path: .build/reports/coverage
          retention-days: 7