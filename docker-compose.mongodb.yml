services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pages-items-api-mongodb
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - API_KEY=test-api-key
      - DB_TYPE=mongodb
      - MONGODB_URI=mongodb://mongodb:27017/fe-server
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: pages-items-api-test
    environment:
      - NODE_ENV=test
      - API_URL=http://api:8080
      - API_KEY=test-api-key
      - TEST_TYPE=${TEST_TYPE:-all}
    volumes:
      - ./.build/reports:/app/.build/reports
      - ./tests:/app/tests:ro
      - ./src:/app/src:ro
    depends_on:
      - api
    command: ["./docker/wait-for-it.sh", "api:8080", "--", "npm", "run", "test:functional"]

volumes:
  mongodb_data:

networks:
  default:
    name: mongodb-api-network
    driver: bridge