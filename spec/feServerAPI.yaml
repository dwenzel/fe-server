openapi: 3.0.2
info:
  version: 1.0.0
  title: Frontend Server API
  description: An API for the Frontend Server to manage pages & items
paths:
  /backend/pages:
    post:
      summary: Create a new page
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Page'
      responses:
        '201':
          description: Page created
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
  /backend/pages/{id}:
    put:
      summary: Update a page
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Page'
      responses:
        '200':
          description: Page updated
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Page not found
    delete:
      summary: Delete a page
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Page deleted
        '401':
          description: Unauthorized
        '404':
          description: Page not found
  /backend/items:
    post:
      summary: Create a new item
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      responses:
        '201':
          description: Item created
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
  /backend/items/{id}:
    put:
      summary: Update an item
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      responses:
        '200':
          description: Item updated
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Item not found
    delete:
      summary: Delete an item
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Item deleted
        '401':
          description: Unauthorized
        '404':
          description: Item not found
  /frontend/pages:
    get:
      summary: Get all pages (public)
      description: Public endpoint to retrieve all pages without authentication
      responses:
        '200':
          description: List of pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Page'
  /frontend/pages/by-slug/{slug}:
    get:
      summary: Get a specific page by slug (public)
      description: Public endpoint to retrieve a specific page by slug without authentication
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-z0-9-_]+$'
      responses:
        '200':
          description: Page details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
        '404':
          description: Page not found
  /frontend/pages/{id}:
    get:
      summary: Get a specific page by ID (public)
      description: Public endpoint to retrieve a specific page by ID without authentication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Page details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
        '404':
          description: Page not found
  /frontend/items:
    get:
      summary: Get all items (public)
      description: Public endpoint to retrieve all items without authentication
      responses:
        '200':
          description: List of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
  /frontend/items/{id}:
    get:
      summary: Get a specific item (public)
      description: Public endpoint to retrieve a specific item without authentication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          description: Item not found
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
  schemas:
    Page:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          description: The page's ID.
        name:
          type: string
          description: The page's name.
        slug:
          type: string
          pattern: '^[a-z0-9-_]+$'
          description: The page's URL path segment.
        attributes:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: integer
              - type: string
                enum: [Option1, Option2]
          description: Page attributes, key-value pairs.
        parent:
          type: string
          format: uuid
          description: The ID of the parent page, if any.
        metadata:
          $ref: '#/components/schemas/Metadata'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'
          description: The items associated with the page.
    Metadata:
      type: object
      description: The metadata of the page.
      properties:
        title:
          type: string
        description:
          type: string
        robots:
          type: string
        keywords:
          type: array
          items:
            type: string
    Item:
      type: object
      required:
        - id
        - parent
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The item's ID.
        name:
          type: string
          description: The item's name.
        attributes:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: integer
              - type: string
                enum: [Option1, Option2]
          description: Item attributes, key-value pairs.
        content:
          type: string
          description: The content of the item.
        parent:
          type: string
          format: uuid
          description: The ID of the parent page or item.
        type:
          type: string
          enum:
            - dynamic
            - list
            - news
            - project
            - event
          description: The type of the item.